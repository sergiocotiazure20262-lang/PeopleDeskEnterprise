# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build, test and deploy ASP.Net Core API to Azure Web App - peopledeskenterprise-sergio

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: BUILD
    runs-on: windows-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore PeopleDeskEnterprise.slnx

      - name: Build solution
        run: dotnet build PeopleDeskEnterprise.slnx --configuration Release --no-restore

      - name: Publish API project
        run: dotnet publish PeopleDesk.Api/PeopleDesk.Api.csproj --configuration Release --no-build --output "${{ env.DOTNET_ROOT }}/myapp"

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: .net-api
          path: ${{ env.DOTNET_ROOT }}/myapp

  unit-tests:
    name: UNIT TESTS
    runs-on: windows-latest
    needs: build

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore PeopleDeskEnterprise.slnx

      - name: Build solution
        run: dotnet build PeopleDeskEnterprise.slnx --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test PeopleDesk.UnitTests/PeopleDesk.UnitTests.csproj --configuration Release --no-build --verbosity normal

  integration-tests:
    name: INTEGRATION TESTS
    runs-on: windows-latest
    needs: unit-tests

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore PeopleDeskEnterprise.slnx

      - name: Build solution
        run: dotnet build PeopleDeskEnterprise.slnx --configuration Release --no-restore

      - name: Run integration tests
        run: dotnet test PeopleDesk.IntegrationTests/PeopleDesk.IntegrationTests.csproj --configuration Release --no-build --verbosity normal

  deploy:
    name: DEPLOY
    runs-on: windows-latest
    needs: integration-tests

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: .net-api

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_189174D97CBF437BA1392ED7B0F46523 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_2FCFA8BBD5DD4921BB20F07C307A30AE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_50123AA9D5FD40709E41D9C70298C537 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'peopledeskenterprise-sergio'
          slot-name: 'Production'
          package: .