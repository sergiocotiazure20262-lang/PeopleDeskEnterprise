services:

  peopledesk.api:
    image: ${DOCKER_REGISTRY-}peopledeskapi
    build:
      context: .
      dockerfile: PeopleDesk.Api/Dockerfile
    container_name: peopledesk.api
    ports:
      - "5051:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=master;User Id=sa;Password=Coti@2026;TrustServerCertificate=True;"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - peopledesk-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: peopledesk.sqlserver
    ports:
      - "1434:1433"
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Coti@2026"
      MSSQL_PID: "Developer"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Coti@2026' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - peopledesk-network

volumes:
  sqlserver-data:

networks:
  peopledesk-network:
    driver: bridge